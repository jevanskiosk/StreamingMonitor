<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fullscreen Playlist with Faster Crawl</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background-color: black;
      height: 100%;
      width: 100%;
      overflow: hidden;
    }

    iframe {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      border: none;
      background-color: black;
    }

    .crawler {
      position: fixed;
      bottom: 5%;
      left: 0;
      right: 0;
      z-index: 10;
      pointer-events: none;
      overflow: hidden;
      white-space: nowrap;
    }

    .crawler__inner {
      display: inline-block;
      animation: crawl 20s linear infinite;
    }

    .crawler__text {
      display: inline-block;
      padding-right: 10rem;
      font-size: 4rem;
      font-weight: bold;
      color: white;
      -webkit-text-stroke: 2px black;
      text-shadow: 
        2px 2px 6px rgba(0,0,0,0.9),
        -2px -2px 6px rgba(0,0,0,0.9),
        0 0 10px rgba(0,0,0,0.8);
    }

    @keyframes crawl {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    @media (max-width: 600px) {
      .crawler__text { font-size: 2rem; -webkit-text-stroke: 1px black; }
    }
  </style>
</head>
<body>
  <iframe 
    src="https://www.youtube.com/embed/videoseries?list=PLoNXhSmdR5P2k5pFKmFZQ7GzIQ_rC21pC&playlist=PLoNXhSmdR5P2k5pFKmFZQ7GzIQ_rC21pC&autoplay=1&loop=1&mute=1&playsinline=1&controls=0"
    allow="autoplay; fullscreen; encrypted-media"
    allowfullscreen>
  </iframe>

  <div class="crawler">
    <div class="crawler__inner">
      <span class="crawler__text">🚀 Sci-Fi is May's genre of the month! See something you like? Check the cart below 👇🏼</span>
      <span class="crawler__text">🚀 Sci-Fi is May's genre of the month! See something you like? Check the cart below 👇🏼</span>
    </div>
  </div>
</body>
</html>
